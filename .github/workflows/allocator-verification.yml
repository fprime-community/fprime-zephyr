name: Allocator Verification

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run proves-core-reference generate/build integration"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  allocator-smoke:
    name: Allocator Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run allocator smoke test
        run: ci/tests/allocator/run_allocator_smoke.sh

  proves-core-integration:
    name: Proves Core Integration
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration }}
    needs: allocator-smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout fprime-zephyr
        uses: actions/checkout@v4
        with:
          path: fprime-zephyr

      - name: Checkout proves-core-reference
        uses: actions/checkout@v4
        with:
          repository: Open-Source-Space-Foundation/proves-core-reference
          path: proves-core-reference

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            gperf \
            ccache \
            dfu-util \
            device-tree-compiler \
            wget \
            xz-utils \
            file \
            make \
            gcc \
            g++ \
            python3-dev \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            libsdl2-dev \
            libmagic1

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup proves-core-reference toolchain
        run: |
          cd proves-core-reference
          make submodules
          make fprime-venv
          make generate-auth-key
          make zephyr
          make keys/proves.pem

      - name: Export Zephyr SDK location
        run: |
          cd proves-core-reference
          SDK_VERSION="$(cat lib/zephyr-workspace/zephyr/SDK_VERSION)"
          echo "ZEPHYR_SDK_INSTALL_DIR=${HOME}/zephyr-sdk-${SDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Run integration verification
        run: |
          export PROVES_CORE_REFERENCE_DIR="${GITHUB_WORKSPACE}/proves-core-reference"
          "${GITHUB_WORKSPACE}/fprime-zephyr/ci/tests/allocator/verify_allocator_change.sh"
